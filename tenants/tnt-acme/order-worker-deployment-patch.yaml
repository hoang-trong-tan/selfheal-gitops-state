apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-worker
  namespace: sample-app
  labels:
    app: order-worker
    selfheal.io/pattern: queue_backlog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-worker
  template:
    metadata:
      labels:
        app: order-worker
        selfheal.io/pattern: queue_backlog
    spec:
      containers:
        - name: main
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            - |
              import time
              print("Order worker running, xử lý queue giả lập")
              while True:
                  print("Processing 1 message...")
                  time.sleep(3)
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
